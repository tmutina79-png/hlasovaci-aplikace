<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Živé výsledky — Workshop MGO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="floating-shapes">
            <span class="shape shape--1"></span>
            <span class="shape shape--2"></span>
            <span class="shape shape--3"></span>
        </div>
        <div class="hero-inner">
            <div class="hero-text">
                <span class="tag tag--purple">Workshop MGO 2026</span>
                <h1 class="mega-title">📊 Živé <span class="gradient-text">výsledky</span></h1>
                <p class="subtitle">Naskenuj QR kód a hlasuj na svém telefonu</p>
            </div>
            <div class="qr-section">
                <div class="qr-card">
                    <img
                        src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&amp;data=https%3A%2F%2Ftmutina79-png.github.io%2Fhlasovaci-aplikace%2Fkviz"
                        onerror="this.onerror=null;this.src='https://quickchart.io/qr?text=https%3A%2F%2Ftmutina79-png.github.io%2Fhlasovaci-aplikace%2Fkviz&size=300'"
                        alt="QR kód pro hlasování"
                        class="qr-img"
                        loading="eager"
                    >
                    <span class="qr-label">📱 Naskenuj a hlasuj!</span>
                    <span class="qr-url">hlasovaci-aplikace/kviz</span>
                </div>
            </div>
        </div>
        <div class="hero-stats">
            <span class="live-badge">🔴 LIVE</span>
            <span class="respondent-badge">👥 <span id="respondent-count">0</span> odpovědí</span>
        </div>
    </header>

    <main class="dashboard" id="dashboard">
        <p class="loading">Načítám výsledky…</p>
    </main>

    <footer class="app-footer">
        <p>Workshop MGO &copy; 2026 &middot; Vibe Coding 🎵</p>
        <button class="reset-btn" onclick="resetAll()">🔄 Resetovat hlasování</button>
    </footer>

    <script src="app.js"></script>
</body>
</html>
